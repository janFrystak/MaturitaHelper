<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procvičování – Maturita 2026</title>
<script src="./manifest.js"></script>
<style>
:root {
  --teal-light:#E1F5EE; --teal-dark:#085041;
  --blue-light:#E6F1FB; --blue-dark:#0C447C; --blue-mid:#378ADD;
  --amber-light:#FAEEDA; --amber-dark:#633806;
  --coral-light:#FAECE7; --coral-dark:#4A1B0C;
  --green-light:#EAF3DE; --green-dark:#27500A;

  --bg:#F8F7F5; --bg-panel:#ffffff;
  --border:#E0DED8; --border-strong:#C8C6C0;
  --text:#1a1a18; --text-muted:#5a5955; --text-faint:#9a9895;

  --eko-light:#E6F1FB; --eko-dark:#0C447C; --eko-border:#B5D4F4;
  --it-light:#E1F5EE;  --it-dark:#085041;  --it-border:#9FE1CB;
  --lit-light:#FAEEDA; --lit-dark:#633806; --lit-border:#FAC775;

  --radius:10px; --radius-sm:5px;
}
body.dark {
  --bg:#111110; --bg-panel:#1C1C1A;
  --border:#2E2D2A; --border-strong:#3E3D3A;
  --text:#F0EFEB; --text-muted:#A8A49E; --text-faint:#6A6762;
  --teal-light:#0D2E24; --teal-dark:#5ECBA8;
  --blue-light:#0D1F33; --blue-dark:#7BB8F0; --blue-mid:#4A90D9;
  --amber-light:#2A1E0A; --amber-dark:#F5C06A;
  --green-light:#132208; --green-dark:#8FD058;
  --eko-light:#0D1F33; --eko-dark:#7BB8F0; --eko-border:#1E3A5A;
  --it-light:#0D2E24;  --it-dark:#5ECBA8;  --it-border:#1A4535;
  --lit-light:#2A1E0A; --lit-dark:#F5C06A; --lit-border:#3D2C0F;
}
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;border:2px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:.75rem;padding:.625rem 1.25rem;
  background:var(--bg-panel);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;}
.topbar-brand{font-weight:700;font-size:15px;flex:1;}
.topbar-sub{font-size:11px;color:var(--text-faint);}
.btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text-muted);
  transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn:hover{background:var(--bg-panel);color:var(--text);border-color:var(--border-strong);}

/* ── TABS ── */
.tabs{display:flex;align-items:center;gap:4px;padding:.75rem 1.25rem .25rem;
  border-bottom:1px solid var(--border);background:var(--bg-panel);}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;color:var(--text-muted);transition:all .15s;border:1px solid transparent;}
.tab:hover{background:var(--bg);color:var(--text);}
.tab.on-all {background:var(--bg);color:var(--text);border-color:var(--border);}
.tab.on-eko {background:var(--eko-light);color:var(--eko-dark);border-color:var(--eko-border);}
.tab.on-it  {background:var(--it-light); color:var(--it-dark); border-color:var(--it-border);}
.tab.on-lit {background:var(--lit-light);color:var(--lit-dark);border-color:var(--lit-border);}

/* ── STATS BAR ── */
.stats-bar{display:flex;align-items:center;gap:1.5rem;
  padding:.625rem 1.25rem;font-size:12px;color:var(--text-muted);
  background:var(--bg-panel);border-bottom:1px solid var(--border);}
.stat-item{display:flex;align-items:center;gap:.4rem;}
.stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sd-none{background:var(--border-strong);}
.sd-wip {background:var(--blue-mid);}
.sd-done{background:var(--green-dark);}

/* ── MAIN ── */
.main{max-width:960px;margin:0 auto;padding:1.5rem 1.25rem;}

/* ── SUBJECT GROUP ── */
.subj-group{margin-bottom:2rem;}
.subj-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:.875rem;}
.subj-hdr h2{font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text-faint);}
.subj-hdr hr{flex:1;border:none;border-top:1px solid var(--border);}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.875rem;}

/* ── NOTE CARD ── */
.note-card{
  background:var(--bg-panel);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem;
  display:flex;flex-direction:column;gap:.75rem;
  transition:border-color .2s,box-shadow .2s;
}
.note-card.has-test:hover{
  border-color:var(--border-strong);
  box-shadow:0 2px 12px rgba(0,0,0,.07);
}
.note-card.no-test{opacity:.55;}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;}
.card-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;}
.b-eko{background:var(--eko-light);color:var(--eko-dark);border:1px solid var(--eko-border);}
.b-it {background:var(--it-light); color:var(--it-dark); border:1px solid var(--it-border);}
.b-lit{background:var(--lit-light);color:var(--lit-dark);border:1px solid var(--lit-border);}
.b-num{background:var(--bg);color:var(--text-muted);border:1px solid var(--border);}

.card-title{font-size:14px;font-weight:600;line-height:1.35;color:var(--text);}
.card-num{font-size:11px;color:var(--text-faint);margin-top:1px;}

/* Progress inside card */
.card-prog{display:flex;flex-direction:column;gap:4px;}
.prog-row{display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--text-muted);}
.prog-bar-outer{height:5px;background:var(--bg);border:1px solid var(--border);
  border-radius:99px;overflow:hidden;}
.prog-bar-inner{height:100%;border-radius:99px;background:var(--blue-mid);transition:width .3s;}
.prog-bar-inner.done{background:var(--green-dark);}

/* Card button */
.card-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:7px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;
  text-decoration:none;cursor:pointer;transition:all .15s;border:none;
  background:var(--blue-dark);color:#fff;
}
.card-btn:hover{opacity:.88;}
.card-btn.done-btn{background:var(--green-dark);}
.no-test .card-btn{background:var(--bg);color:var(--text-faint);
  border:1px solid var(--border);cursor:default;}
.no-test .card-btn:hover{opacity:1;}

@media(max-width:600px){.card-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div>
    <div class="topbar-brand">Procvičování</div>
  </div>
  <a href="index.html" class="btn" style="text-decoration:none">← Katalog</a>
  <button class="btn" onclick="toggleDark()" id="darkBtn">🌙 Tmavý</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab on-all" id="tab-all" onclick="switchTab('all')">Vše</div>
  <div class="tab"        id="tab-eko" onclick="switchTab('eko')">EKO</div>
  <div class="tab"        id="tab-it"  onclick="switchTab('it')">IT</div>
  <div class="tab"        id="tab-lit" onclick="switchTab('lit')">LIT</div>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar"></div>

<!-- MAIN -->
<div class="main" id="main"></div>

<script>
const SUBJECTS = ['eko','it','lit'];
const SUBJ_LABEL = { eko:'Ekonomika', it:'Informační technologie', lit:'Literatura' };
let NOTES = [];
let curTab = 'all';
let dark = localStorage.getItem('mat-dark') === '1';

// ── Dark mode ─────────────────────────────────────────────────────────────
function applyDark() {
  document.body.classList.toggle('dark', dark);
  document.getElementById('darkBtn').textContent = dark ? '☀ Světlý' : '🌙 Tmavý';
}
function toggleDark() {
  dark = !dark;
  localStorage.setItem('mat-dark', dark ? '1' : '0');
  applyDark();
}
window.addEventListener('storage', e => { if (e.key === 'mat-dark') { dark = e.newValue === '1'; applyDark(); }});
applyDark();

// ── Load notes ────────────────────────────────────────────────────────────
function loadNotes() {
  const manifest = window.MAT_MANIFEST || {};
  const tests    = manifest.tests || {};
  const result   = [];
  for (const s of SUBJECTS) {
    (manifest[s] || []).forEach(file => {
      const numMatch = file.match(/^(\d+)/);
      const num  = numMatch ? parseInt(numMatch[1]) : 99;
      const id   = `${s}-${String(num).padStart(2,'0')}`;
      let title  = null;
      try { const c = localStorage.getItem(`mat-reg::${id}`); if (c) title = JSON.parse(c).title; } catch(e) {}
      if (!title) title = file.replace(/^\d+_/,'').replace(/\.html$/,'').replace(/_/g,' ');
      const testPath = tests[id] || null;
      result.push({ id, s, n:num, title, testPath });
    });
  }
  return result;
}

// ── Progress from localStorage ────────────────────────────────────────────
function getProgress(id) {
  try {
    const raw = localStorage.getItem(`mat-test::${id}::progress`);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// ── Switch tab ────────────────────────────────────────────────────────────
function switchTab(t) {
  curTab = t;
  ['all','eko','it','lit'].forEach(x => {
    const el = document.getElementById('tab-'+x);
    el.className = 'tab' + (x === t ? ` on-${t}` : '');
  });
  render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const visible = curTab === 'all' ? NOTES : NOTES.filter(n => n.s === curTab);
  const main    = document.getElementById('main');
  main.innerHTML = '';

  // Stats
  const withTest = NOTES.filter(n => n.testPath);
  let started = 0, completed = 0;
  withTest.forEach(n => {
    const p = getProgress(n.id);
    if (!p) return;
    if (p.answered > 0 && p.answered < p.total) started++;
    if (p.answered === p.total && p.total > 0)   completed++;
  });
  document.getElementById('statsBar').innerHTML =
    `<span class="stat-item"><span class="stat-dot sd-none"></span>${withTest.length} testů k dispozici</span>` +
    `<span class="stat-item"><span class="stat-dot sd-wip"></span>${started} rozpracováno</span>` +
    `<span class="stat-item"><span class="stat-dot sd-done"></span>${completed} dokončeno</span>`;

  const groups = curTab === 'all' ? SUBJECTS : [curTab];

  groups.forEach(s => {
    const items = visible.filter(n => n.s === s);
    if (!items.length) return;

    const group = document.createElement('div');
    group.className = 'subj-group';
    group.innerHTML = `<div class="subj-hdr"><h2>${SUBJ_LABEL[s]}</h2><hr></div>`;

    const grid = document.createElement('div');
    grid.className = 'card-grid';
    items.forEach(n => grid.appendChild(buildCard(n)));
    group.appendChild(grid);
    main.appendChild(group);
  });

  if (!main.innerHTML) {
    main.innerHTML = '<p style="color:var(--text-faint);font-size:13px;padding:1rem 0">Žádné zápisky.</p>';
  }
}

// ── Build card ────────────────────────────────────────────────────────────
function buildCard(note) {
  const prog    = getProgress(note.id);
  const hasTest = !!note.testPath;
  const total   = prog ? prog.total    : 0;
  const answered= prog ? prog.answered : 0;
  const isDone  = hasTest && prog && answered === total && total > 0;
  const isWip   = hasTest && prog && answered > 0 && !isDone;
  const pct     = total > 0 ? Math.round(answered / total * 100) : 0;

  const card = document.createElement('div');
  card.className = 'note-card' + (hasTest ? ' has-test' : ' no-test');

  // Badge row
  const subjColor = note.s;
  const badgeHTML = `<div style="display:flex;gap:4px;flex-wrap:wrap">
    <span class="card-badge b-${subjColor}">${subjColor.toUpperCase()}</span>
    <span class="card-badge b-num">${String(note.n).padStart(2,'0')}</span>
  </div>`;

  // Status label
  let statusLabel = '';
  if (!hasTest)  statusLabel = '<span style="font-size:11px;color:var(--text-faint)">Test připravujeme…</span>';
  else if (isDone) statusLabel = '<span style="font-size:11px;color:var(--green-dark);font-weight:600">✓ Dokončeno</span>';
  else if (isWip)  statusLabel = `<span style="font-size:11px;color:var(--blue-dark)">${answered}/${total} hotovo</span>`;

  // Progress bar
  const progHTML = hasTest ? `<div class="card-prog">
    <div class="prog-row">
      <span>${answered} / ${total} otázek</span>
      <span>${prog ? prog.pts : 0} / ${prog ? prog.totalPts : '?'} b</span>
    </div>
    <div class="prog-bar-outer">
      <div class="prog-bar-inner${isDone?' done':''}" style="width:${pct}%"></div>
    </div>
  </div>` : '';

  // Button
  const btnHTML = hasTest
    ? `<a class="card-btn${isDone?' done-btn':''}" href="${note.testPath}">
        ${isDone ? '↻ Zopakovat' : (isWip ? '▶ Pokračovat' : '▶ Spustit test')}
       </a>`
    : `<div class="card-btn">Brzy k dispozici</div>`;

  card.innerHTML = `
    <div class="card-top">
      ${badgeHTML}
      ${statusLabel}
    </div>
    <div>
      <div class="card-title">${note.title}</div>
    </div>
    ${progHTML}
    ${btnHTML}
  `;
  return card;
}

// ── Boot ──────────────────────────────────────────────────────────────────
NOTES = loadNotes();
render();
</script>
</body>
</html>
