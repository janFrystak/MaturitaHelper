<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procvičování – Maturita 2026</title>
<style>
:root {
  --teal-light:#E1F5EE; --teal-dark:#085041;
  --blue-light:#E6F1FB; --blue-dark:#0C447C;
  --amber-light:#FAEEDA; --amber-dark:#633806;
  --coral-light:#FAECE7; --coral-dark:#4A1B0C;

  --bg:#F8F7F5; --bg-panel:#ffffff; --bg-card:#ffffff;
  --border:#E0DED8; --border-strong:#C8C6C0;
  --text:#1a1a18; --text-muted:#5a5955; --text-faint:#9a9895;

  --eko-light:#E6F1FB; --eko-dark:#0C447C; --eko-border:#B5D4F4;
  --it-light:#E1F5EE;  --it-dark:#085041;  --it-border:#9FE1CB;
  --lit-light:#FAEEDA; --lit-dark:#633806; --lit-border:#FAC775;

  --status-none-bg:#F8F7F5;   --status-none-c:#9a9895;
  --status-wip-bg:#E6F1FB;    --status-wip-c:#0C447C;
  --status-done-bg:#EAF3DE;   --status-done-c:#27500A;

  --radius:10px; --radius-sm:5px;
}
body.dark {
  --bg:#111110; --bg-panel:#1C1C1A; --bg-card:#1C1C1A;
  --border:#2E2D2A; --border-strong:#3E3D3A;
  --text:#F0EFEB; --text-muted:#A8A49E; --text-faint:#6A6762;

  --teal-light:#0D2E24; --teal-dark:#5ECBA8;
  --blue-light:#0D1F33; --blue-dark:#7BB8F0;
  --amber-light:#2A1E0A; --amber-dark:#F5C06A;
  --coral-light:#2A1208; --coral-dark:#F5A08A;

  --eko-light:#0D1F33; --eko-dark:#7BB8F0; --eko-border:#1E3A5A;
  --it-light:#0D2E24;  --it-dark:#5ECBA8;  --it-border:#1A4535;
  --lit-light:#2A1E0A; --lit-dark:#F5C06A; --lit-border:#3D2C0F;

  --status-none-bg:#1C1C1A;  --status-none-c:#6A6762;
  --status-wip-bg:#0D1F33;   --status-wip-c:#7BB8F0;
  --status-done-bg:#132208;  --status-done-c:#8FD058;
}

*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;border:2px solid var(--bg);}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:52px;background:var(--bg-panel);border-bottom:0.5px solid var(--border);gap:1rem;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--text-muted);text-decoration:none;padding:5px 9px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);transition:all 0.15s;}
.back-btn:hover{color:var(--text);background:var(--border);}
.topbar-title{font-size:15px;font-weight:700;}
.topbar-sub{font-size:12px;color:var(--text-muted);}
.topbar-right{display:flex;align-items:center;gap:6px;}
.btn{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:6px 11px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{background:var(--border);color:var(--text);}

/* ── SUBJECT TABS ── */
.subj-bar{display:flex;align-items:center;gap:0;padding:0 1.25rem;background:var(--bg-panel);border-bottom:0.5px solid var(--border);}
.s-tab{padding:10px 14px;font-size:12px;font-weight:600;letter-spacing:0.03em;cursor:pointer;color:var(--text-faint);border-bottom:2px solid transparent;transition:color 0.15s;user-select:none;}
.s-tab:hover{color:var(--text-muted);}
.s-tab.on-all{color:var(--text);border-bottom-color:var(--text);}
.s-tab.on-eko{color:var(--eko-dark);border-bottom-color:var(--eko-dark);}
.s-tab.on-it {color:var(--it-dark); border-bottom-color:var(--it-dark);}
.s-tab.on-lit{color:var(--lit-dark);border-bottom-color:var(--lit-dark);}
.subj-spacer{flex:1;}
.stats-bar{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--text-faint);}
.stat-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;}
.dot-wip {background:#378ADD;}
.dot-done{background:#52A84A;}
.dot-none{background:var(--border);}

/* ── MAIN ── */
.main{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem;}

/* ── GRID ── */
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:1.5rem;}

/* ── QUESTION CARD ── */
.q-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:border-color 0.15s;}
.q-card:hover{border-color:var(--border-strong);}
.q-card.open{border-color:var(--border-strong);}
.q-card.missing{opacity:0.5;}

.card-top{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
.card-badges{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:0.04em;}
.b-eko{background:var(--eko-light);color:var(--eko-dark);}
.b-it {background:var(--it-light); color:var(--it-dark);}
.b-lit{background:var(--lit-light);color:var(--lit-dark);}
.b-num{background:var(--bg);border:0.5px solid var(--border);color:var(--text-faint);}

.card-body{flex:1;}
.card-title{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px;}
.card-title.missing{color:var(--text-faint);font-weight:400;font-style:italic;}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
.pill-none{background:var(--status-none-bg);color:var(--status-none-c);}
.pill-wip {background:var(--status-wip-bg); color:var(--status-wip-c);}
.pill-done{background:var(--status-done-bg);color:var(--status-done-c);}

.card-footer{padding:10px 16px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:6px;}
.btn-practice{flex:1;padding:7px 10px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-align:center;}
.btn-practice:hover{background:var(--border);color:var(--text);}
.btn-practice.active{background:var(--text);color:var(--bg);}
.btn-note{padding:7px 9px;font-size:12px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text-muted);cursor:pointer;transition:all 0.15s;text-decoration:none;display:flex;align-items:center;}
.btn-note:hover{background:var(--border);color:var(--text);}

/* ── ANSWER AREA (expands inside card) ── */
.answer-area{padding:0 16px 14px;display:none;flex-direction:column;gap:8px;border-top:0.5px solid var(--border);}
.answer-area.open{display:flex;}
.answer-area textarea{width:100%;min-height:140px;padding:10px 12px;font-size:13px;line-height:1.6;font-family:inherit;color:var(--text);background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-sm);resize:vertical;outline:none;transition:border-color 0.15s;}
.answer-area textarea:focus{border-color:var(--border-strong);}
.answer-area textarea::placeholder{color:var(--text-faint);}
.answer-btns{display:flex;gap:6px;flex-wrap:wrap;}
.ab{padding:6px 12px;font-size:12px;font-weight:600;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.ab:hover{background:var(--border);color:var(--text);}
.ab-wip {background:var(--status-wip-bg); color:var(--status-wip-c);  border-color:var(--eko-border);}
.ab-done{background:var(--status-done-bg);color:var(--status-done-c); border-color:#B8DFA0;}
.ab-clear{margin-left:auto;color:var(--text-faint);}
.word-count{font-size:11px;color:var(--text-faint);align-self:flex-end;}

/* ── CUSTOM QUESTION ── */
.add-section{margin-bottom:1.5rem;}
.add-section h2{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}
.add-form{display:flex;gap:8px;}
.add-form input{flex:1;padding:8px 12px;font-size:13px;background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;font-family:inherit;}
.add-form input:focus{border-color:var(--border-strong);}
.add-form input::placeholder{color:var(--text-faint);}
.add-form button{padding:8px 14px;font-size:12px;font-weight:600;background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.add-form button:hover{background:var(--border);color:var(--text);}

/* ── SECTION HEADER ── */
.section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:0.5rem;}
.section-hdr h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);}
.section-hdr hr{flex:1;border:none;border-top:0.5px solid var(--border);}

@media(max-width:600px){.q-grid{grid-template-columns:1fr;}}
</style>
<script src="./manifest.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Katalog</a>
    <div class="topbar-title">Procvičování</div>
    <div class="topbar-sub" id="topbarSub"></div>
  </div>
  <div class="topbar-right">
    <button class="btn" onclick="toggleDark()" id="darkBtn">🌙 Tmavý</button>
  </div>
</div>

<div class="subj-bar">
  <div class="s-tab on-all" id="tab-all" onclick="switchTab('all')">Vše</div>
  <div class="s-tab" id="tab-eko" onclick="switchTab('eko')">EKO</div>
  <div class="s-tab" id="tab-it"  onclick="switchTab('it')">IT</div>
  <div class="s-tab" id="tab-lit" onclick="switchTab('lit')">LIT</div>
  <div class="subj-spacer"></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="main">

  <!-- Custom question form -->
  <div class="add-section">
    <h2>Přidat vlastní otázku</h2>
    <div class="add-form">
      <input type="text" id="customInput" placeholder="Napiš svoji otázku…" onkeydown="if(event.key==='Enter')addCustom()">
      <button onclick="addCustom()">+ Přidat</button>
    </div>
  </div>

  <!-- Question grid -->
  <div id="qGrid" class="q-grid"></div>

</div>

<script>
// ── NOTES DATA (dynamic — driven by manifest.js in the Helper root) ───────
const SUBJECTS   = ['eko','it','lit'];
const SUBJ_LABEL = { eko:'EKO', it:'IT', lit:'LIT' };
let NOTES = [];

function loadNotes() {
  const manifest = window.MAT_MANIFEST || {};
  const result   = [];
  for (const s of SUBJECTS) {
    const files = manifest[s] || [];
    files.forEach(file => {
      const numMatch = file.match(/^(\d+)/);
      const num  = numMatch ? parseInt(numMatch[1]) : 99;
      const id   = `${s}-${String(num).padStart(2,'0')}`;
      const path = `./notes/${s.toUpperCase()}/${file}`;
      let title = null;
      try {
        const cached = localStorage.getItem(`mat-reg::${id}`);
        if (cached) title = JSON.parse(cached).title;
      } catch(e) {}
      if (!title) title = file.replace(/^\d+_/, '').replace(/\.html$/, '').replace(/_/g,' ');
      result.push({ id, s, n:num, title, path });
    });
  }
  return result;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let curTab = 'all';
let dark = localStorage.getItem('mat-dark') === '1';

// localStorage keys
const statusKey  = id => `mat-prac::${id}::status`;  // 'none'|'wip'|'done'
const answerKey  = id => `mat-prac::${id}::answer`;
const customKey  = () => 'mat-prac::custom';

function getStatus(id) { return localStorage.getItem(statusKey(id)) || 'none'; }
function setStatus(id, v) { localStorage.setItem(statusKey(id), v); }
function getAnswer(id) { return localStorage.getItem(answerKey(id)) || ''; }
function setAnswer(id, v) { localStorage.setItem(answerKey(id), v); }
function getCustom() { return JSON.parse(localStorage.getItem(customKey()) || '[]'); }
function setCustom(arr) { localStorage.setItem(customKey(), JSON.stringify(arr)); }

// ── BOOT ──────────────────────────────────────────────────────────────────
if (dark) document.body.classList.add('dark');
updateDarkBtn();
NOTES = loadNotes();
render();

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(t) {
  curTab = t;
  ['all','eko','it','lit'].forEach(x => {
    const el = document.getElementById('tab-'+x);
    el.className = 's-tab' + (x === t ? ` on-${t}` : '');
  });
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const customs = getCustom();
  const allItems = [
    ...NOTES,
    ...customs.map(c => ({ id: c.id, s: 'custom', n: null, title: c.title, path: null }))
  ];

  const visible = curTab === 'all'
    ? allItems
    : allItems.filter(n => n.s === curTab);

  // Stats
  let wip = 0, done = 0;
  visible.forEach(n => {
    const st = getStatus(n.id);
    if (st === 'wip')  wip++;
    if (st === 'done') done++;
  });
  document.getElementById('statsBar').innerHTML =
    `<span><span class="stat-dot dot-wip"></span>${wip} rozpracováno</span>` +
    `<span><span class="stat-dot dot-done"></span>${done} hotovo</span>` +
    `<span><span class="stat-dot dot-none"></span>${visible.length - wip - done} nezačato</span>`;

  document.getElementById('topbarSub').textContent =
    `${done} / ${visible.length} hotovo`;

  // Group by subject for "all" view
  const grid = document.getElementById('qGrid');
  grid.innerHTML = '';

  if (curTab === 'all') {
    ['eko','it','lit','custom'].forEach(subj => {
      const items = visible.filter(n => n.s === subj);
      if (!items.length) return;
      const hdr = document.createElement('div');
      hdr.className = 'section-hdr';
      const labels = { eko:'Ekonomika', it:'Informační technologie', lit:'Literatura', custom:'Vlastní otázky' };
      hdr.innerHTML = `<h2>${labels[subj]}</h2><hr>`;
      hdr.style.gridColumn = '1 / -1';
      grid.appendChild(hdr);
      items.forEach(n => grid.appendChild(buildCard(n)));
    });
  } else {
    visible.forEach(n => grid.appendChild(buildCard(n)));
    // Custom questions always shown at bottom in filtered view
    if (curTab !== 'all') {
      const customs2 = getCustom();
      if (customs2.length) {
        const hdr = document.createElement('div');
        hdr.className = 'section-hdr';
        hdr.innerHTML = `<h2>Vlastní otázky</h2><hr>`;
        hdr.style.gridColumn = '1 / -1';
        grid.appendChild(hdr);
        customs2.forEach(c => grid.appendChild(buildCard({ id: c.id, s:'custom', n:null, title:c.title, path:null })));
      }
    }
  }
}

function buildCard(note) {
  const status = getStatus(note.id);
  const answer = getAnswer(note.id);
  const isCustom = note.s === 'custom';

  const card = document.createElement('div');
  card.className = 'q-card' + (answer ? ' open' : '');
  card.id = 'card-' + note.id;

  const pillClass = { none:'pill-none', wip:'pill-wip', done:'pill-done' }[status];
  const pillText  = { none:'Nezačato', wip:'Rozpracováno', done:'Hotovo' }[status];
  const pillDot   = { none:'●', wip:'◐', done:'✓' }[status];

  const badgeHtml = isCustom
    ? `<span class="badge b-num">★</span>`
    : `<span class="badge b-${note.s}">${SUBJ_LABEL[note.s]}</span><span class="badge b-num">${String(note.n).padStart(2,'0')}</span>`;

  const noteBtn = note.path
    ? `<a class="btn-note" href="${note.path}" target="_blank" title="Otevřít zápis">↗</a>`
    : '';

  const deleteBtn = isCustom
    ? `<button class="ab ab-clear" onclick="deleteCustom('${note.id}',event)" title="Smazat">✕</button>`
    : '';

  const words = answer.trim() ? answer.trim().split(/\s+/).length : 0;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-badges">${badgeHtml}</div>
      <div class="card-body">
        <div class="card-title">${note.title}</div>
        <span class="status-pill ${pillClass}" id="pill-${note.id}">${pillDot} ${pillText}</span>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn-practice ${answer ? 'active' : ''}" id="pbtn-${note.id}" onclick="toggleAnswer('${note.id}')">
        ${answer ? '✏ Upravit odpověď' : '✏ Odpovědět'}
      </button>
      ${noteBtn}
    </div>
    <div class="answer-area ${answer ? 'open' : ''}" id="area-${note.id}">
      <textarea id="ta-${note.id}" placeholder="Napiš svoji odpověď…" oninput="onType('${note.id}', this)">${answer}</textarea>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <div class="answer-btns">
          <button class="ab ab-wip"  onclick="markStatus('${note.id}','wip')">◐ Rozpracováno</button>
          <button class="ab ab-done" onclick="markStatus('${note.id}','done')">✓ Hotovo</button>
          <button class="ab"         onclick="markStatus('${note.id}','none')">↺ Reset</button>
          ${deleteBtn}
        </div>
        <span class="word-count" id="wc-${note.id}">${words > 0 ? words + ' slov' : ''}</span>
      </div>
    </div>`;

  return card;
}

// ── CARD INTERACTIONS ─────────────────────────────────────────────────────
function toggleAnswer(id) {
  const area = document.getElementById('area-' + id);
  const btn  = document.getElementById('pbtn-' + id);
  const isOpen = area.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
  btn.textContent = isOpen ? '✏ Upravit odpověď' : '✏ Odpovědět';
  if (isOpen) document.getElementById('ta-' + id).focus();
}

function onType(id, ta) {
  setAnswer(id, ta.value);
  const words = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  const wc = document.getElementById('wc-' + id);
  if (wc) wc.textContent = words > 0 ? words + ' slov' : '';
  // Auto-set to wip if not yet set
  if (ta.value.trim() && getStatus(id) === 'none') {
    setStatus(id, 'wip');
    updatePill(id, 'wip');
  }
  const pbtn = document.getElementById('pbtn-' + id);
  if (pbtn) { pbtn.classList.add('active'); pbtn.textContent = '✏ Upravit odpověď'; }
}

function markStatus(id, status) {
  setStatus(id, status);
  updatePill(id, status);
  // Also save current textarea content
  const ta = document.getElementById('ta-' + id);
  if (ta) setAnswer(id, ta.value);
  updateTopbar();
  updateStatsBar();
}

function updatePill(id, status) {
  const pill = document.getElementById('pill-' + id);
  if (!pill) return;
  const pillClass = { none:'pill-none', wip:'pill-wip', done:'pill-done' }[status];
  const pillText  = { none:'Nezačato', wip:'Rozpracováno', done:'Hotovo' }[status];
  const pillDot   = { none:'●', wip:'◐', done:'✓' }[status];
  pill.className = `status-pill ${pillClass}`;
  pill.textContent = `${pillDot} ${pillText}`;
}

function updateTopbar() {
  const customs = getCustom();
  const allItems = [
    ...NOTES.filter(n => n.title),
    ...customs.map(c => ({ id: c.id }))
  ];
  const visible = curTab === 'all' ? allItems : allItems.filter(n => (n.s || 'custom') === curTab);
  const done = visible.filter(n => getStatus(n.id) === 'done').length;
  document.getElementById('topbarSub').textContent = `${done} / ${visible.length} hotovo`;
}

function updateStatsBar() {
  const customs = getCustom();
  const allItems = [
    ...NOTES.filter(n => n.title),
    ...customs.map(c => ({ id: c.id }))
  ];
  const visible = curTab === 'all' ? allItems : allItems.filter(n => (n.s || 'custom') === curTab);
  let wip = 0, done = 0;
  visible.forEach(n => {
    const st = getStatus(n.id);
    if (st === 'wip')  wip++;
    if (st === 'done') done++;
  });
  document.getElementById('statsBar').innerHTML =
    `<span><span class="stat-dot dot-wip"></span>${wip} rozpracováno</span>` +
    `<span><span class="stat-dot dot-done"></span>${done} hotovo</span>` +
    `<span><span class="stat-dot dot-none"></span>${visible.length - wip - done} nezačato</span>`;
}

// ── CUSTOM QUESTIONS ──────────────────────────────────────────────────────
function addCustom() {
  const input = document.getElementById('customInput');
  const text = input.value.trim();
  if (!text) return;
  const customs = getCustom();
  const id = 'custom-' + Date.now();
  customs.push({ id, title: text });
  setCustom(customs);
  input.value = '';
  render();
  // Scroll to the new card
  setTimeout(() => {
    const card = document.getElementById('card-' + id);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 50);
}

function deleteCustom(id, e) {
  e.stopPropagation();
  const customs = getCustom().filter(c => c.id !== id);
  setCustom(customs);
  localStorage.removeItem(statusKey(id));
  localStorage.removeItem(answerKey(id));
  render();
}

// ── DARK MODE ─────────────────────────────────────────────────────────────
function applyDark() {
  dark = localStorage.getItem('mat-dark') === '1';
  document.body.classList.toggle('dark', dark);
  updateDarkBtn();
}
function toggleDark() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  localStorage.setItem('mat-dark', dark ? '1' : '0');
  updateDarkBtn();
}
function updateDarkBtn() {
  const btn = document.getElementById('darkBtn');
  if (btn) btn.innerHTML = dark ? '☀ Světlý' : '🌙 Tmavý';
}
window.addEventListener('storage', e => { if (e.key === 'mat-dark') applyDark(); });
</script>
